<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Policy-First Expense Auditor — AI-powered expense claim management with automated policy compliance checking.">
    <title>TrueClaim — Policy-First Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo/TrueClaim_logo_1.png">
</head>

<body>

    <!-- ══════════════ HEADER ══════════════ -->
    <header class="app-header" id="appHeader" style="display:none;">
        <div class="logo" onclick="navigate(currentUser?.role === 'company' ? 'dashboard' : 'employee')">
            <img src="logo/TrueClaim_logo_1.png" alt="Logo" style="height: 75px;">
            <span>TrueClaim</span>
        </div>

        <nav>
            <ul class="nav-links" id="navLinks"></ul>
        </nav>

        <div class="header-actions">
            <div class="user-badge" id="userBadge">
                <div class="avatar" id="userAvatar"></div>
                <span id="userName"></span>
                <span class="role-tag" id="userRole"></span>
            </div>
            <button class="notif-bell" id="notifBell" onclick="toggleNotifPanel()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="notif-badge" id="notifBadge"></span>
            </button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </header>

    <!-- ══════════════ MAIN CONTENT ══════════════ -->
    <main class="main-content" id="mainContent"></main>

    <!-- ══════════════ NOTIFICATION PANEL ══════════════ -->
    <div class="notif-overlay" id="notifOverlay" onclick="toggleNotifPanel()"></div>
    <aside class="notif-panel" id="notifPanel">
        <div class="notif-panel-header">
            <h3>Notifications</h3>
            <div style="display:flex; gap:8px; align-items:center;">
                <button class="link-text" onclick="markAllRead()">Mark all read</button>
                <button class="notif-panel-close" onclick="toggleNotifPanel()">✕</button>
            </div>
        </div>
        <div class="notif-list" id="notifList"></div>
    </aside>

    <!-- ══════════════ TOAST CONTAINER ══════════════ -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>

</html>
